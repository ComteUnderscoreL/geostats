<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stats Challenges</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .medal-icon {
      width: 26px;
      height: 26px;
      display: block;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,.18));
    }

    .medal-cell {
      width: 52px;
      text-align: center;
      vertical-align: middle;
    }

    .score-cell {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .score-value {
      min-width: 72px;
      text-align: right;
      display: inline-block;
    }

    .no-medal-spacer {
      width: 26px;
      height: 26px;
      display: inline-block;
      opacity: 0;
    }

    table td.num,
    table th.num {
      text-align: right;
    }
  
    .medal-summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    .medal-summary-table th,
    .medal-summary-table td {
      padding: 6px 8px;
      vertical-align: middle;
    }

    .medal-summary-table th {
      text-align: left;
    }

    .medal-summary-table td.num,
    .medal-summary-table th.num {
      text-align: right;
    }

    .medal-pair {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 8px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .medal-pair:first-child {
      margin-left: 0;
    }

    .medal-pair img {
      width: 18px;
      height: 18px;
      display: block;
    }

    .player-name-cell {
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

  </style>
</head>
<body>
<main class="wrap">
  <h1>No Move Challenges</h1>

  <div class="layout">
    <div class="main">
      <section class="card">
        <h2>Challenge du jour</h2>
        <div id="currentMeta" class="muted"></div>
        <a id="currentLink" class="btn" target="_blank" rel="noopener">Ouvrir le challenge</a>
      </section>

      <section class="card">
        <h2>Dernier challenge terminé</h2>
        <div id="lastMeta" class="muted"></div>
        <a id="lastLink" class="btn" target="_blank" rel="noopener">Ouvrir le challenge</a>
        <div id="lastLeaderboard"></div>
      </section>

      <section class="card">
        <h2>Historique</h2>
        <div id="history"></div>
      </section>
    </div>

    <aside class="sidebar">

      <section class="card">
        <h3>Classement des médailles</h3>
        <div id="medalRanking" class="muted">Chargement...</div>
      </section>

      <section class="card sticky">
        <h3>Live </h3>
        <div id="twitchWrap" class="embed muted">Aucun live configuré.</div>
        <h3>Mario Kart Jeudi 21h30</h3>
        <h3>Playlist Challenges No Move</h3>
        <div id="ytWrap" class="embed muted">Aucune playlist configurée.</div>
      </section>
    </aside>
  </div>
</main>

<script>
const BASE_URL = "https://www.geoguessr.com/challenge/";
const TOP_N = 10;

const MEDAL_PATHS = {
  netherite: "medal/netherite.svg",
  emerald: "medal/emerald.svg",
  diamond: "medal/diamond.svg",
  gold: "medal/gold.svg",
  iron: "medal/iron.svg",
  copper: "medal/copper.svg"
};

function parseKV(text) {
  const out = {};
  for (const raw of text.split(/\r?\n/)) {
    const line = raw.trim();
    if (!line || line.startsWith("#")) continue;
    const m = line.match(/^([^=]+)=(.*)$/);
    if (m) out[m[1].trim()] = m[2].trim();
  }
  return out;
}

async function loadText(path) {
  const r = await fetch(path, { cache: "no-store" });
  if (!r.ok) return "";
  return await r.text();
}

async function loadTSV(path) {
  const r = await fetch(path, { cache: "no-store" });
  if (!r.ok) throw new Error("Cannot load " + path);
  const lines = (await r.text()).trim().split("\n");
  if (lines.length < 2) return [];
  const cols = lines[0].split("\t");
  return lines.slice(1).map(row => {
    const vals = row.split("\t");
    const o = {};
    cols.forEach((c, i) => o[c] = vals[i]);
    return o;
  });
}

function esc(s) {
  return String(s).replace(/[&<>\"']/g, c => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[c]));
}

function toScore(value) {
  const n = Number(String(value).replace(/[^\d.-]/g, ""));
  return Number.isFinite(n) ? n : 0;
}

function formatScore(value) {
  const score = toScore(value);
  return score.toLocaleString("fr-FR");
}

function getMedalName(score) {
  if (score >= 24000) return "netherite";
  if (score >= 23000) return "emerald";
  if (score >= 22000) return "diamond";
  if (score >= 20000) return "gold";
  if (score >= 18000) return "iron";
  if (score >= 15000) return "copper";
  return null;
}

function renderMedal(score) {
  const medal = getMedalName(score);
  if (!medal) return `<span class="no-medal-spacer"></span>`;
  const src = MEDAL_PATHS[medal];
  return `<img class="medal-icon" src="${src}" alt="${medal}" title="${medal}">`;
}

function renderScore(scoreRaw) {
  const score = toScore(scoreRaw);
  return `<div class="score-cell">${renderMedal(score)}<span class="score-value">${esc(formatScore(score))}</span></div>`;
}

function renderLeaderboard(rows) {
  return `<table>
    <thead>
      <tr>
        <th>#</th>
        <th>Joueur</th>
        <th class="num">Score</th>
      </tr>
    </thead>
    <tbody>
      ${rows.slice(0, TOP_N).map(r => `
          <tr>
            <td>${esc(r.position)}</td>
            <td>${esc(r.player)}</td>
            <td class="num">${renderScore(r.total_score)}</td>
          </tr>
        `
      ).join("")}
    </tbody>
  </table>`;
}

function renderHistoryBlock(numero, rows) {
  const url = rows[0].challenge_id ? BASE_URL + rows[0].challenge_id : "#";
  return `<article class="subcard">
    <div class="row">
      <div class="title">#${esc(numero)} — ${esc(rows[0].map)}</div>
      <a class="btn small" href="${esc(url)}" target="_blank" rel="noopener">Lien</a>
    </div>
    ${renderLeaderboard(rows)}
  </article>`;
}


function computeMedalRanking(rows) {
  const counts = {};

  for (const r of rows) {
    const player = String(r.player || "").trim();
    if (!player) continue;

    const medal = getMedalName(toScore(r.total_score));
    if (!medal) continue;

    if (!counts[player]) {
      counts[player] = {
        netherite: 0,
        emerald: 0,
        diamond: 0,
        gold: 0,
        iron: 0,
        copper: 0
      };
    }

    counts[player][medal]++;
  }

  return Object.entries(counts).sort((a, b) => {
    const A = a[1];
    const B = b[1];

    return (
      B.netherite - A.netherite ||
      B.emerald - A.emerald ||
      B.diamond - A.diamond ||
      B.gold - A.gold ||
      B.iron - A.iron ||
      B.copper - A.copper ||
      a[0].localeCompare(b[0], "fr", { sensitivity: "base" })
    );
  });
}

function renderMedalPair(name, count) {
  return `<span class="medal-pair"><img src="${esc(MEDAL_PATHS[name])}" alt="${esc(name)}" title="${esc(name)}"><span>${esc(count)}</span></span>`;
}

function renderMedalRanking(ranking) {
  if (!ranking.length) return '<div class="muted">Aucune médaille pour le moment.</div>';

  return `<table class="medal-summary-table">
    <thead>
      <tr>
        <th>Joueur</th>
        <th class="num">Médailles</th>
      </tr>
    </thead>
    <tbody>
      ${ranking.map(([player, m]) => `
        <tr>
          <td class="player-name-cell">${esc(player)}</td>
          <td class="num">
            ${renderMedalPair("netherite", m.netherite)}
            ${renderMedalPair("emerald", m.emerald)}
            ${renderMedalPair("diamond", m.diamond)}
            ${renderMedalPair("gold", m.gold)}
            ${renderMedalPair("iron", m.iron)}
            ${renderMedalPair("copper", m.copper)}
          </td>
        </tr>
      `).join("")}
    </tbody>
  </table>`;
}


function renderTwitch(channel) {
  const parent = encodeURIComponent(location.hostname);
  const src = `https://player.twitch.tv/?channel=${encodeURIComponent(channel)}&parent=${parent}&muted=true`;
  return `<iframe src="${src}" height="300" allowfullscreen frameborder="0"></iframe>`;
}

function renderYT(pl) {
  const src = `https://www.youtube.com/embed/videoseries?list=${encodeURIComponent(pl)}`;
  return `<iframe src="${src}" height="300" allowfullscreen frameborder="0"></iframe>`;
}

(async () => {
  const cfg = parseKV(await loadText("data/current.txt"));

  if (cfg.challenge_id) {
    document.getElementById("currentMeta").textContent = "Challenge en cours";
    document.getElementById("currentLink").href = BASE_URL + cfg.challenge_id;
  } else {
    document.getElementById("currentMeta").textContent = "Aucun challenge en cours";
    document.getElementById("currentLink").style.display = "none";
  }

  if (cfg.twitch_channel) {
    const el = document.getElementById("twitchWrap");
    el.classList.remove("muted");
    el.innerHTML = renderTwitch(cfg.twitch_channel);
  }

  if (cfg.youtube_playlist) {
    const el = document.getElementById("ytWrap");
    el.classList.remove("muted");
    el.innerHTML = renderYT(cfg.youtube_playlist);
  }

  const totals = await loadTSV("data/totals.tsv");
  if (!totals.length) return;

  const medalRanking = computeMedalRanking(totals);
  document.getElementById("medalRanking").innerHTML = renderMedalRanking(medalRanking);

  const byNumero = {};
  for (const r of totals) {
    const n = Number(r.Numero);
    if (!byNumero[n]) byNumero[n] = [];
    byNumero[n].push(r);
  }

  const numeros = Object.keys(byNumero).map(Number).sort((a,b)=>b-a);
  for (const n of numeros) byNumero[n].sort((a,b)=>Number(a.position)-Number(b.position));

  const last = numeros[0];
  document.getElementById("lastMeta").textContent =
    `Challenge #${last} — ${byNumero[last][0].map}`;
  document.getElementById("lastLink").href =
    BASE_URL + (byNumero[last][0].challenge_id || "");
  document.getElementById("lastLeaderboard").innerHTML =
    renderLeaderboard(byNumero[last]);

  document.getElementById("history").innerHTML =
    numeros.slice(1).map(n => renderHistoryBlock(n, byNumero[n])).join("");
})();
</script>
</body>
</html>
